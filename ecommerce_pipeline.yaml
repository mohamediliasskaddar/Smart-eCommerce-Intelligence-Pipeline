          \ to MinIO\"\"\"\n    import sys\n    import os\n    sys.path.append('/app')\n\
          \    from agents.agent_coordinator import run_ingestion\n    run_ingestion()\n\
          \n"
        env:
        - name: MINIO_ENDPOINT
          value: minio.storage.svc.cluster.local:9000
        - name: MINIO_BUCKET
          value: smart-ecommerce
        - name: MINIO_ACCESS_KEY
