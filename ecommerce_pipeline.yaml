    exec-train:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train():\n    \"\"\"Train XGBoost model and save results to MinIO\"\
          \"\"\n    import sys\n    import pandas as pd\n    sys.path.append('/app')\n\
          \    from storage import StorageManager, OUTPUT_PREFIX\n    from xgboost\
          \ import XGBRegressor\n    from sklearn.metrics import mean_squared_error,\
          \ r2_score\n    import logging\n    import time\n\n    logging.basicConfig(level=logging.INFO)\n\
          \    logger = logging.getLogger(__name__)\n    logger.info(\"=== Starting\
          \ train ===\")\n    start_time = time.time()\n    storage = StorageManager()\n\
          \n    # Safety checks\n    required_files = [\"X_train.csv\", \"X_test.csv\"\
          , \"y_train.csv\", \"y_test.csv\"]\n    for filename in required_files:\n\
          \        if not storage.exists(filename, prefix=OUTPUT_PREFIX):\n      \
          \      raise FileNotFoundError(f\"Missing input: output/{filename}. Run\
          \ feature_engineering first.\")\n\n    # Load data\n    X_train = storage.load_dataframe(\"\
          X_train.csv\", prefix=OUTPUT_PREFIX)\n    X_test = storage.load_dataframe(\"\
          X_test.csv\", prefix=OUTPUT_PREFIX)\n    y_train = storage.load_dataframe(\"\
          y_train.csv\", prefix=OUTPUT_PREFIX).squeeze()\n    y_test = storage.load_dataframe(\"\
          y_test.csv\", prefix=OUTPUT_PREFIX).squeeze()\n\n    # Train XGBoost model\n\
          \    model = XGBRegressor(n_estimators=100, max_depth=6, learning_rate=0.1,\
          \ random_state=42)\n    model.fit(X_train, y_train)\n\n    # Make predictions\
          \ and calculate metrics\n    y_pred = model.predict(X_test)\n    mse = mean_squared_error(y_test,\
          \ y_pred)\n    r2 = r2_score(y_test, y_pred)\n\n    # Feature importance\n\
          \    importance_df = pd.DataFrame({\n        'feature': X_train.columns,\n\
          \        'importance': model.feature_importances_\n    }).sort_values('importance',\
          \ ascending=False)\n\n    # Save results\n    storage.save_pickle(model,\
          \ \"xgboost_model.pkl\", prefix=OUTPUT_PREFIX)\n    storage.save_dataframe(importance_df,\
          \ \"feature_importance.csv\", prefix=OUTPUT_PREFIX)\n\n    results = {\n\
          \        \"model\": \"XGBoost Regressor\",\n        \"mse\": mse,\n    \
          \    \"r2_score\": r2,\n        \"n_estimators\": 100,\n        \"max_depth\"\
          : 6,\n        \"features_used\": len(X_train.columns)\n    }\n    storage.save_json(results,\
          \ \"xgboost_results.json\", prefix=OUTPUT_PREFIX)\n\n    elapsed_time =\
          \ time.time() - start_time\n    logger.info(f\"=== XGBoost training completed\
          \ in {elapsed_time:.2f}s - MSE: {mse:.4f}, R\xB2: {r2:.4f} ===\")\n\n"
        env:
        - name: MINIO_ENDPOINT
          value: minio.storage.svc.cluster.local:9000
        - name: MINIO_BUCKET
          value: smart-ecommerce
        - name: MINIO_ACCESS_KEY
          value: minio
        - name: MINIO_SECRET_KEY
          value: minio123
        - name: MINIO_SECURE
          value: 'false'
        image: mohamediliasskaddar/e-commerce-pipeline:latest
        resources:
          cpuLimit: 1.0
          cpuRequest: 0.5
          memoryLimit: 2.147483648
          memoryRequest: 1.073741824
          resourceCpuLimit: '1'
          resourceCpuRequest: '0.5'
          resourceMemoryLimit: 2Gi
          resourceMemoryRequest: 1Gi
