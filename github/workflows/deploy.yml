# .github/workflows/deploy.yml
# Deploy pipeline to Kubeflow on merge to main
# Requires secrets: KFP_HOST, DOCKER_REGISTRY, DOCKER_USERNAME, DOCKER_PASSWORD

name: Deploy to Kubeflow

on:
  push:
    branches: [main, master]
    paths:
      - 'pipeline/**'
      - 'data/processed/products.csv'
      - 'infra/**'

  workflow_dispatch:   # allow manual trigger from GitHub UI
    inputs:
      top_k:
        description: "Number of top-K products to select"
        default: "100"
      n_clusters:
        description: "Number of KMeans clusters"
        default: "3"

env:
  DOCKER_IMAGE: ecommerce-pipeline
  PYTHON_VERSION: "3.11"

jobs:

  # ── PUSH DOCKER IMAGE TO REGISTRY ───────────────────────────────────
  push-image:
    name: Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.pipeline
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:latest
            ${{ secrets.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}

  # ── SUBMIT PIPELINE RUN TO KUBEFLOW ─────────────────────────────────
  deploy-pipeline:
    name: Submit KFP Run
    runs-on: ubuntu-latest
    needs: push-image
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install kfp
        run: pip install kfp

      - name: Submit pipeline run
        env:
          KFP_HOST: ${{ secrets.KFP_HOST }}
        run: |
          python pipeline/pipeline_definition.py \
            --submit \
            --host $KFP_HOST

      - name: Notify success
        run: |
          echo "Pipeline submitted to $KFP_HOST"
          echo "Run triggered by: ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
