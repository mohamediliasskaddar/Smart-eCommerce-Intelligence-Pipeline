# .github/workflows/ci.yml
# CI/CD Pipeline — Smart eCommerce Intelligence
# Triggers: push to main/master, pull requests
# Jobs: lint → test → build Docker → compile KFP pipeline

name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DOCKER_IMAGE: ecommerce-pipeline
  PYTHON_VERSION: "3.11"

jobs:

  # ── JOB 1: LINT + FORMAT CHECK ──────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint tools
        run: pip install flake8 black

      - name: Check formatting (black)
        run: black --check --diff pipeline/ agents/ llm/
        continue-on-error: true   # warn but don't fail CI on format

      - name: Lint (flake8)
        run: flake8 pipeline/ agents/ llm/ --max-line-length=120 --ignore=E501,W503

  # ── JOB 2: UNIT TESTS ───────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/ -v \
            --cov=pipeline \
            --cov=agents \
            --cov-report=term-missing \
            --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  # ── JOB 3: DATA VALIDATION ──────────────────────────────────────────
  validate-data:
    name: Validate Dataset
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install pandas numpy

      - name: Check products.csv schema and quality
        run: |
          python -c "
          import pandas as pd, sys

          try:
              df = pd.read_csv('data/processed/products.csv')
          except FileNotFoundError:
              print('WARNING: products.csv not found — skipping data validation')
              sys.exit(0)

          required = ['product_id','source_platform','name','category','brand',
                      'price','discount_pct','rating','review_count','in_stock',
                      'stock_qty','shop_country','days_since_publish','is_on_promo',
                      'price_segment','popularity_score','topk_label']

          missing_cols = [c for c in required if c not in df.columns]
          assert not missing_cols, f'Missing columns: {missing_cols}'
          assert len(df) >= 2000,  f'Only {len(df)} rows — need >= 2000'
          assert df.isnull().sum().sum() == 0, 'Null values found'
          assert (df.price > 0).all(), 'Zero prices found'

          topk_pct = df.topk_label.mean()
          assert 0.15 <= topk_pct <= 0.25, f'topk imbalance: {topk_pct:.2%}'

          print(f'Dataset OK: {len(df)} products, {len(df.columns)} cols, 0 nulls')
          print(f'topk balance: {topk_pct:.1%}')
          "

  # ── JOB 4: BUILD DOCKER IMAGE ───────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, validate-data]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build pipeline image
        run: |
          docker build \
            -f infra/Dockerfile.pipeline \
            -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} \
            -t ${{ env.DOCKER_IMAGE }}:latest \
            .

      - name: Test image runs
        run: |
          docker run --rm ${{ env.DOCKER_IMAGE }}:latest \
            python -c "import xgboost, sklearn, mlxtend; print('Image OK')"

  # ── JOB 5: COMPILE KUBEFLOW PIPELINE ────────────────────────────────
  compile-pipeline:
    name: Compile KFP Pipeline
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install kfp
        run: pip install kfp

      - name: Compile pipeline to YAML
        run: |
          python pipeline/pipeline_definition.py --compile
          echo "Pipeline compiled successfully"

      - name: Upload compiled pipeline
        uses: actions/upload-artifact@v4
        with:
          name: kubeflow-pipeline-yaml
          path: infra/k8s/kubeflow-pipeline.yaml
          retention-days: 30
