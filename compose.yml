services:
  agents:
    build:
      context: .
      dockerfile: infra/docker/agents.Dockerfile
    volumes:
      - ./data:/app/data

  pipeline:
    build:
      context: .
      dockerfile: infra/docker/pipeline.Dockerfile
    depends_on:
      - agents
    volumes:
      - ./data:/app/data

  dashboard:
    build:
      context: .
      dockerfile: infra/docker/dashboard.Dockerfile
    depends_on:
      - agents
      - pipeline

    volumes:
      - ./data:/app/data
    ports:
      - "8501:8501"