services:
  agents:
    build:
      context: .
      dockerfile: infra/docker/agents.Dockerfile
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: smart-ecommerce
      MINIO_SECURE: "false"
      DATA_PATH: /app/data
    depends_on:
      - minio

  pipeline:
    build:
      context: .
      dockerfile: infra/docker/pipeline.Dockerfile
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: smart-ecommerce
      MINIO_SECURE: "false"
      DATA_PATH: /app/data
    depends_on:
      - agents
      - minio

  dashboard:
    build:
      context: .
      dockerfile: infra/docker/dashboard.Dockerfile
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: smart-ecommerce
      MINIO_SECURE: "false"
      DATA_PATH: /app/data
    depends_on:
      - agents
      - pipeline
      - minio
    ports:
      - "8501:8501"

  minio:
    image: minio/minio
    # container_name: minio
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  minio_data: